services:
  searxng:
    image: searxng/searxng
    container_name: r2-searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888

  # PII gateway (Microsoft Presidio) — FROZEN behind the "pii" profile: a plain
  # `docker compose up -d` does NOT start it (PII_MODE is disabled by default, so
  # nothing calls it). Re-enable later with: docker compose --profile pii up -d
  presidio-analyzer:
    profiles: ["pii"]
    build:
      context: ./presidio
    platform: linux/arm64
    container_name: r2-presidio-analyzer
    ports:
      - "127.0.0.1:5002:3000"
    restart: unless-stopped

  presidio-anonymizer:
    profiles: ["pii"]
    image: mcr.microsoft.com/presidio-anonymizer:2.2.362
    container_name: r2-presidio-anonymizer
    ports:
      - "127.0.0.1:5001:3000"
    restart: unless-stopped
